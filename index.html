<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz SNA</title>
  <style>
    :root {
      --bg: #f3f4f6;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #d1d5db;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --correct-bg: #dcfce7;
      --correct-border: #16a34a;
      --wrong-bg: #fee2e2;
      --wrong-border: #dc2626;
      --info-bg: #eff6ff;
      --info-border: #60a5fa;
      --star: #f59e0b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 20px;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
    }

    .header {
      margin-bottom: 18px;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0;
      font-size: 34px;
    }

    .star-btn {
      border: none;
      background: white;
      border-radius: 999px;
      width: 54px;
      height: 54px;
      font-size: 28px;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      line-height: 1;
    }

    .star-btn.active {
      color: var(--star);
    }

    .stats-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 18px;
    }

    .pill {
      background: white;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 15px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 18px;
    }

    .toolbar button {
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 15px;
      cursor: pointer;
      background: #e5e7eb;
      color: #111827;
    }

    .toolbar button.active-mode {
      background: var(--primary);
      color: white;
    }

    .card {
      position: relative;
      background: var(--card);
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.06);
    }

    .materia {
      font-size: 15px;
      color: var(--muted);
      margin-bottom: 16px;
      font-weight: bold;
    }

    .domanda {
      font-size: 31px;
      line-height: 1.35;
      margin-bottom: 24px;
      font-weight: 700;
    }

    .risposte {
      display: grid;
      gap: 14px;
    }

    .risposta-btn {
      width: 100%;
      text-align: left;
      border: 2px solid transparent;
      border-radius: 18px;
      padding: 18px 20px;
      background: #e5e7eb;
      color: #111;
      font-size: 17px;
      line-height: 1.45;
      cursor: pointer;
      transition: 0.15s ease;
    }

    .risposta-btn:hover {
      transform: translateY(-1px);
    }

    .risposta-btn strong {
      display: inline-block;
      min-width: 26px;
    }

    .risposta-btn.disabled {
      cursor: default;
      opacity: 0.95;
    }

    .risposta-btn.correct {
      background: var(--correct-bg);
      border-color: var(--correct-border);
    }

    .risposta-btn.wrong {
      background: var(--wrong-bg);
      border-color: var(--wrong-border);
    }

    .feedback {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
      min-height: 28px;
    }

    .feedback.correct {
      color: #15803d;
    }

    .feedback.wrong {
      color: #b91c1c;
    }

    .actions {
      margin-top: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .action-btn {
      border: none;
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 16px;
      cursor: pointer;
      background: var(--primary);
      color: white;
    }

    .action-btn:hover {
      background: var(--primary-dark);
    }

    .action-btn.secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .action-btn.secondary:hover {
      background: #d1d5db;
    }

    .spiegazione-box {
      margin-top: 18px;
      padding: 18px;
      background: var(--info-bg);
      border: 1px solid var(--info-border);
      border-radius: 14px;
      display: none;
      line-height: 1.55;
      font-size: 16px;
    }

    .spiegazione-box.visible {
      display: block;
    }

    .footer-note {
      margin-top: 18px;
      color: var(--muted);
      font-size: 14px;
    }

    .empty-box {
      margin-top: 10px;
      padding: 16px;
      border-radius: 14px;
      background: #fff7ed;
      border: 1px solid #fdba74;
      color: #9a3412;
      display: none;
    }

    .riferimento-link {
      display: inline-block;
      margin: 4px 4px 0 0;
      padding: 4px 12px;
      background: #dbeafe;
      border: 1px solid #93c5fd;
      border-radius: 999px;
      font-size: 13px;
      color: #1d4ed8;
      cursor: pointer;
      text-decoration: none;
    }

    .riferimento-link:hover {
      background: #bfdbfe;
    }

    .riferimenti-section {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid #bfdbfe;
    }

    .riferimenti-label {
      font-size: 13px;
      font-weight: bold;
      color: #6b7280;
      margin-bottom: 6px;
    }

    .norma-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .norma-overlay.visible {
      display: flex;
    }

    .norma-modal {
      background: white;
      border-radius: 18px;
      padding: 28px;
      max-width: 600px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
    }

    .norma-modal-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
      gap: 12px;
    }

    .norma-modal-titolo {
      font-size: 20px;
      font-weight: bold;
      color: var(--text);
    }

    .norma-modal-fonte {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .norma-modal-testo {
      font-size: 15px;
      line-height: 1.65;
      white-space: pre-wrap;
      color: var(--text);
    }

    .norma-close-btn {
      border: none;
      background: #e5e7eb;
      border-radius: 999px;
      width: 32px;
      height: 32px;
      font-size: 16px;
      cursor: pointer;
      flex-shrink: 0;
      line-height: 1;
    }

    .norma-close-btn:hover {
      background: #d1d5db;
    }

    @media (max-width: 640px) {
      body {
        padding: 14px;
      }

      h1 {
        font-size: 28px;
      }

      .domanda {
        font-size: 25px;
      }

      .card {
        padding: 18px;
      }

      .risposta-btn {
        font-size: 16px;
        padding: 16px;
      }

      .star-btn {
        width: 48px;
        height: 48px;
        font-size: 24px;
      }
    }

    .source-badge {
      position: absolute;
      top: 14px;
      right: 18px;
      font-size: 11px;
      color: var(--muted);
      background: #f3f4f6;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 2px 10px;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .source-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 2000;
      align-items: center;
      justify-content: center;
    }

    .source-overlay.visible {
      display: flex;
    }

    .source-modal {
      background: white;
      border-radius: 18px;
      padding: 28px;
      max-width: 440px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }

    .source-modal h2 {
      margin: 0 0 18px;
      font-size: 20px;
    }

    .source-list {
      display: grid;
      gap: 10px;
      margin-bottom: 22px;
    }

    .source-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      font-size: 15px;
      user-select: none;
    }

    .source-item:hover {
      background: #f9fafb;
    }

    .source-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: var(--primary);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-top">
        <h1>Quiz SNA</h1>
        <button id="star-btn" class="star-btn" title="Aggiungi ai preferiti" onclick="togglePreferito()">☆</button>
      </div>

      <div class="stats-bar">
        <div class="pill">Domanda: <span id="numero-domanda">-</span></div>
        <div class="pill">Corrette: <span id="corrette">0</span></div>
        <div class="pill">Sbagliate: <span id="sbagliate">0</span></div>
        <div class="pill">Totale risposte: <span id="totale-risposte">0</span></div>
        <div class="pill">Preferiti: <span id="totale-preferiti">0</span></div>
      </div>

      <div class="toolbar">
        <button id="mode-all" class="active-mode" onclick="setModalita('tutte')">Tutte</button>
        <button id="mode-pref" onclick="setModalita('preferiti')">Solo preferiti</button>
        <button onclick="mostraSelezioneFonti()">📂 Cambia fonti</button>
      </div>
    </div>

    <div class="card">
      <div class="source-badge" id="source-badge"></div>
      <div class="materia" id="materia">Materia</div>
      <div class="domanda" id="domanda">Caricamento domanda...</div>

      <div class="risposte" id="risposte"></div>

      <div class="feedback" id="feedback"></div>

      <div class="actions">
        <button class="action-btn secondary" id="btn-spiegazione" onclick="toggleSpiegazione()" disabled>
          Mostra spiegazione
        </button>
        <button class="action-btn" onclick="prossimaDomanda()">
          Prossima domanda
        </button>
      </div>

      <div class="spiegazione-box" id="spiegazione-box"></div>
      <div class="empty-box" id="empty-box">Non hai ancora aggiunto domande ai preferiti.</div>

      <div class="footer-note">
        Tocca la stellina per salvare la domanda corrente nei preferiti.
      </div>
    </div>
  </div>

  <div class="source-overlay" id="source-overlay">
    <div class="source-modal">
      <h2>Seleziona le fonti delle domande</h2>
      <div class="source-list" id="source-list"></div>
      <button class="action-btn" onclick="avviaQuiz()" style="width:100%">Avvia Quiz</button>
      <div id="source-errore" style="display:none; margin-top:12px; color:#b91c1c; font-size:14px;">Seleziona almeno un file.</div>
    </div>
  </div>

  <div class="norma-overlay" id="norma-overlay" onclick="chiudiNorma(event)">
    <div class="norma-modal" id="norma-modal">
      <div class="norma-modal-header">
        <div class="norma-modal-titolo" id="norma-titolo"></div>
        <button class="norma-close-btn" onclick="chiudiNorma()">✕</button>
      </div>
      <div class="norma-modal-fonte" id="norma-fonte"></div>
      <div class="norma-modal-testo" id="norma-testo"></div>
    </div>
  </div>

  <script src="domande/manifest.js"></script>
  <script>
    let corrente = null;
    let correttaGiaData = false;
    let corrette = 0;
    let sbagliate = 0;
    let totaleRisposte = 0;
    let modalita = "tutte";

    function caricaPreferiti() {
      try {
        const raw = localStorage.getItem("quiz_preferiti");
        const arr = raw ? JSON.parse(raw) : [];
        return Array.isArray(arr) ? arr : [];
      } catch (e) {
        return [];
      }
    }

    function salvaPreferiti(lista) {
      localStorage.setItem("quiz_preferiti", JSON.stringify(lista));
    }

    function isPreferita(id) {
      return caricaPreferiti().includes(id);
    }

    function togglePreferito() {
      if (!corrente) return;

      const preferiti = caricaPreferiti();
      const index = preferiti.indexOf(corrente.id);

      if (index >= 0) {
        preferiti.splice(index, 1);
      } else {
        preferiti.push(corrente.id);
      }

      salvaPreferiti(preferiti);
      aggiornaStellina();
      aggiornaContatorePreferiti();
    }

    function aggiornaStellina() {
      const btn = document.getElementById("star-btn");
      if (!corrente) {
        btn.textContent = "☆";
        btn.classList.remove("active");
        return;
      }

      if (isPreferita(corrente.id)) {
        btn.textContent = "★";
        btn.classList.add("active");
        btn.title = "Rimuovi dai preferiti";
      } else {
        btn.textContent = "☆";
        btn.classList.remove("active");
        btn.title = "Aggiungi ai preferiti";
      }
    }

    function aggiornaContatorePreferiti() {
      document.getElementById("totale-preferiti").innerText = caricaPreferiti().length;
    }

    function getPoolDomande() {
      if (modalita === "preferiti") {
        const preferiti = caricaPreferiti();
        return (window._TUTTE_LE_DOMANDE || []).filter(d => preferiti.includes(d.id));
      }
      return window._TUTTE_LE_DOMANDE || [];
    }

    function setModalita(nuovaModalita) {
      modalita = nuovaModalita;

      document.getElementById("mode-all").classList.toggle("active-mode", modalita === "tutte");
      document.getElementById("mode-pref").classList.toggle("active-mode", modalita === "preferiti");

      prossimaDomanda();
    }

    function prossimaDomanda() {
      const pool = getPoolDomande();
      const emptyBox = document.getElementById("empty-box");

      if (!pool.length) {
        corrente = null;
        document.getElementById("numero-domanda").innerText = "-";
        document.getElementById("materia").innerText = "Preferiti";
        document.getElementById("domanda").innerText = "Nessuna domanda disponibile.";
        document.getElementById("risposte").innerHTML = "";
        document.getElementById("feedback").innerText = "";
        document.getElementById("btn-spiegazione").disabled = true;
        document.getElementById("spiegazione-box").classList.remove("visible");
        document.getElementById("spiegazione-box").innerText = "";
        emptyBox.style.display = "block";
        aggiornaStellina();
      document.getElementById("source-badge").textContent = "";

      emptyBox.style.display = "none";

      const indice = Math.floor(Math.random() * pool.length);
      corrente = pool[indice];
      correttaGiaData = false;

      document.getElementById("numero-domanda").innerText = corrente.id;
      document.getElementById("materia").innerText = corrente.materia;
      document.getElementById("domanda").innerText = corrente.domanda;
      document.getElementById("feedback").innerText = "";
      document.getElementById("feedback").className = "feedback";

      const spiegazioneBox = document.getElementById("spiegazione-box");
      spiegazioneBox.classList.remove("visible");
      spiegazioneBox.innerHTML = "";

      const btnSpiegazione = document.getElementById("btn-spiegazione");
      btnSpiegazione.disabled = true;
      btnSpiegazione.innerText = "Mostra spiegazione";

      const risposte = document.getElementById("risposte");
      risposte.innerHTML = "";

      ["A", "B", "C", "D", "E"].forEach(lettera => {
        if (corrente.opzioni[lettera]) {
          const btn = document.createElement("button");
          btn.className = "risposta-btn";
          btn.innerHTML = `<strong>${lettera}:</strong> ${corrente.opzioni[lettera]}`;
          btn.onclick = () => verificaRisposta(lettera);
          risposte.appendChild(btn);
        }
      });

      aggiornaStellina();
      document.getElementById("source-badge").textContent = corrente._source || "";
    }

    function verificaRisposta(letteraSelezionata) {
      if (!corrente || correttaGiaData) return;

      correttaGiaData = true;
      totaleRisposte++;

      const bottoni = document.querySelectorAll(".risposta-btn");
      bottoni.forEach(btn => {
        btn.classList.add("disabled");
        btn.disabled = true;

        const testo = btn.innerText.trim();
        const lettera = testo.charAt(0);

        if (lettera === corrente.corretta) {
          btn.classList.add("correct");
        }

        if (lettera === letteraSelezionata && letteraSelezionata !== corrente.corretta) {
          btn.classList.add("wrong");
        }
      });

      const feedback = document.getElementById("feedback");

      if (letteraSelezionata === corrente.corretta) {
        corrette++;
        feedback.innerText = "✅ Risposta corretta";
        feedback.classList.add("correct");
      } else {
        sbagliate++;
        feedback.innerText = `❌ Risposta sbagliata. La risposta corretta è ${corrente.corretta}.`;
        feedback.classList.add("wrong");
      }

      document.getElementById("corrette").innerText = corrette;
      document.getElementById("sbagliate").innerText = sbagliate;
      document.getElementById("totale-risposte").innerText = totaleRisposte;

      document.getElementById("btn-spiegazione").disabled = false;
    }

    function toggleSpiegazione() {
      if (!corrente) return;

      const box = document.getElementById("spiegazione-box");
      const btn = document.getElementById("btn-spiegazione");

      if (!box.classList.contains("visible")) {
        renderSpiegazione(box);
        box.classList.add("visible");
        btn.innerText = "Nascondi spiegazione";
      } else {
        box.classList.remove("visible");
        btn.innerText = "Mostra spiegazione";
      }
    }

    function renderSpiegazione(box) {
      box.innerHTML = "";
      const packSpiega = (window._QUIZ_SPIEGAZIONI || {})[corrente._packId || ""] || {};
      const spiega = packSpiega[corrente.id] || null;

      if (!spiega) {
        const em = document.createElement("em");
        em.textContent = "Spiegazione non disponibile.";
        box.appendChild(em);
        return;
      }

      const testoDiv = document.createElement("div");
      testoDiv.textContent = spiega.testo;
      box.appendChild(testoDiv);

      if (spiega.riferimenti && spiega.riferimenti.length > 0) {
        const sezione = document.createElement("div");
        sezione.className = "riferimenti-section";

        const label = document.createElement("div");
        label.className = "riferimenti-label";
        label.textContent = "Riferimenti normativi";
        sezione.appendChild(label);

        spiega.riferimenti.forEach(rif => {
          const link = document.createElement("a");
          link.className = "riferimento-link";
          link.textContent = rif.etichetta;
          link.addEventListener("click", () => apriNorma(rif.normaId));
          sezione.appendChild(link);
        });

        box.appendChild(sezione);
      }
    }

    function apriNorma(normaId) {
      const norma = window.NORME && window.NORME[normaId];
      if (!norma) return;

      document.getElementById("norma-titolo").textContent = norma.titolo;
      document.getElementById("norma-fonte").textContent = norma.fonte;
      document.getElementById("norma-testo").textContent = norma.testo;
      document.getElementById("norma-overlay").classList.add("visible");
    }

    function chiudiNorma(event) {
      if (event && event.target !== document.getElementById("norma-overlay")) return;
      document.getElementById("norma-overlay").classList.remove("visible");
    }

    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const existing = document.querySelector('script[src="' + src + '"]');
        if (existing) { resolve(); return; }
        const s = document.createElement("script");
        s.src = src;
        s.onload = resolve;
        s.onerror = () => reject(new Error("Impossibile caricare: " + src));
        document.head.appendChild(s);
      });
    }

    function mostraSelezioneFonti() {
      const overlay = document.getElementById("source-overlay");
      overlay.classList.add("visible");
      const list = document.getElementById("source-list");
      list.innerHTML = "";
      QUIZ_MANIFEST.forEach(pack => {
        const label = document.createElement("label");
        label.className = "source-item";
        const cb = document.createElement("input");
        cb.type = "checkbox";
        cb.value = pack.id;
        cb.checked = true;
        label.appendChild(cb);
        label.appendChild(document.createTextNode(" " + pack.label));
        list.appendChild(label);
      });
      document.getElementById("source-errore").style.display = "none";
    }

    async function avviaQuiz() {
      const checkboxes = document.querySelectorAll("#source-list input[type='checkbox']:checked");
      const selectedIds = Array.from(checkboxes).map(cb => cb.value);
      if (!selectedIds.length) {
        document.getElementById("source-errore").style.display = "block";
        return;
      }
      const toLoad = QUIZ_MANIFEST.filter(p => selectedIds.includes(p.id));
      window._QUIZ_PACKS = window._QUIZ_PACKS || {};
      window._QUIZ_SPIEGAZIONI = window._QUIZ_SPIEGAZIONI || {};
      try {
        for (const pack of toLoad) {
          if (!window._QUIZ_PACKS[pack.id]) {
            await loadScript(pack.file);
          }
          if (pack.spiegazioni && !window._QUIZ_SPIEGAZIONI[pack.id]) {
            await loadScript(pack.spiegazioni);
          }
          if (pack.norme) {
            for (const normaFile of pack.norme) {
              await loadScript(normaFile).catch(() => {});
            }
          }
        }
      } catch (e) {
        alert("Errore nel caricamento del file: " + e.message);
        return;
      }
      window._TUTTE_LE_DOMANDE = [];
      toLoad.forEach(pack => {
        const domande = window._QUIZ_PACKS[pack.id] || [];
        domande.forEach(d => {
          window._TUTTE_LE_DOMANDE.push(Object.assign({}, d, { _source: pack.label, _packId: pack.id }));
        });
      });
      document.getElementById("source-overlay").classList.remove("visible");
      prossimaDomanda();
    }

    aggiornaContatorePreferiti();
    mostraSelezioneFonti();
  </script>
</body>
</html>
